[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from   = "/api/config"
  to     = "/.netlify/functions/config-get"
  status = 200
  conditions = {Method = ["GET"]}

[[redirects]]
  from   = "/api/config"
  to     = "/.netlify/functions/config-save"
  status = 200
  conditions = {Method = ["POST"]}

[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200
