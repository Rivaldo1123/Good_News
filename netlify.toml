[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from   = "/api/config"
  to     = "/.netlify/functions/config"
  status = 200

[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200
