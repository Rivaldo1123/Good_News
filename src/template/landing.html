<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Church</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script id="site-config">
  /* BEGIN_CONFIG */
  window.C = CHURCH_CONFIG_PLACEHOLDER;
  /* END_CONFIG */
  </SCRIPTEND>
  <style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Inter',sans-serif;color:#222;background:#fff;line-height:1.6}
  img{max-width:100%;display:block}
  a{text-decoration:none;color:inherit}
  :root{--accent:#6c4ecb;--accent-dark:#5a3db9;--hf:'Playfair Display',serif}
  #nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:20px 48px;transition:all .3s}
  #nav.scrolled{background:rgba(255,255,255,.97);backdrop-filter:blur(12px);box-shadow:0 2px 24px rgba(0,0,0,.08);padding:12px 48px}
  .nav-logo{font-size:18px;font-weight:700;color:#fff;font-family:var(--hf);transition:color .3s}
  #nav.scrolled .nav-logo{color:#1a1a2e}
  .nav-links{display:flex;align-items:center;gap:28px}
  .nav-links a{font-size:14px;font-weight:500;color:rgba(255,255,255,.9);transition:color .2s}
  #nav.scrolled .nav-links a{color:#555}
  .nav-links a:hover{color:var(--accent)}
  .nav-cta{padding:9px 22px;border-radius:24px;font-size:13px;font-weight:600;background:var(--accent);color:#fff !important;transition:all .2s}
  .nav-cta:hover{background:var(--accent-dark) !important;transform:translateY(-1px)}
  .hamburger{display:none;background:none;border:none;cursor:pointer;color:#fff;font-size:24px;padding:4px}
  #nav.scrolled .hamburger{color:#333}
  .mob-nav{display:none;position:fixed;inset:0;background:rgba(255,255,255,.98);z-index:1001;flex-direction:column;align-items:center;justify-content:center;gap:28px}
  .mob-nav.open{display:flex}
  .mob-nav a{font-size:22px;font-weight:600;color:#1a1a2e}
  .mob-close{position:absolute;top:20px;right:24px;font-size:28px;cursor:pointer;color:#333;background:none;border:none}
  #hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:120px 24px 80px;overflow:hidden}
  .hero-bg{position:absolute;inset:0;background-size:cover;background-position:center}
  .hero-ov{position:absolute;inset:0}
  .hero-cnt{position:relative;z-index:1;max-width:780px}
  .hero-badge{display:inline-block;font-size:11px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.4);border-radius:20px;padding:5px 16px;margin-bottom:24px}
  .hero-h1{font-family:var(--hf);font-size:clamp(40px,7vw,72px);color:#fff;line-height:1.1;margin-bottom:20px;text-shadow:0 2px 20px rgba(0,0,0,.3)}
  .hero-sub{font-size:clamp(16px,2vw,20px);color:rgba(255,255,255,.88);max-width:580px;margin:0 auto 36px;line-height:1.65}
  .hero-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .btn{padding:15px 36px;border-radius:40px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-block}
  .btn-p{background:var(--accent);color:#fff;box-shadow:0 6px 24px rgba(0,0,0,.25)}
  .btn-p:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,0,0,.3)}
  .btn-o{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.5);backdrop-filter:blur(4px)}
  .btn-o:hover{background:rgba(255,255,255,.25)}
  .scroll-hint{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.6);font-size:11px;letter-spacing:1.4px;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:4px;animation:bob 2.5s ease-in-out infinite}
  .scroll-hint::after{content:"↓";font-size:18px}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(7px)}}
  #info-bar{background:var(--accent);display:flex;justify-content:center;flex-wrap:wrap}
  .ib-item{display:flex;align-items:center;gap:10px;padding:14px 36px;font-size:13px;font-weight:500;color:#fff;border-right:1px solid rgba(255,255,255,.25)}
  .ib-item:last-child{border-right:none}
  .sec{padding:80px 24px}
  .sec-inner{max-width:1100px;margin:0 auto}
  .sec-hdr{text-align:center;margin-bottom:52px}
  .eyebrow{font-size:11px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
  .sec-h2{font-family:var(--hf);font-size:clamp(28px,4vw,42px);color:#1a1a2e;line-height:1.2;margin-bottom:10px}
  .sec-sub{font-size:16px;color:#666;max-width:500px;margin:0 auto}
  #about{background:#fff}
  .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center}
  .about-vis{border-radius:20px;overflow:hidden;aspect-ratio:4/3;background:#f0f0f8;display:flex;align-items:center;justify-content:center;font-size:80px}
  .about-vis img{width:100%;height:100%;object-fit:cover}
  .about-eyebrow{font-size:11px;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
  .about-h2{font-family:var(--hf);font-size:clamp(26px,3.5vw,38px);color:#1a1a2e;line-height:1.2;margin-bottom:20px}
  .about-body p{font-size:16px;color:#444;line-height:1.85;margin-bottom:16px}
  .about-body p:last-child{margin-bottom:0}
  #services{background:#f9f9fc}
  .svc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
  .svc-card{background:#fff;border-radius:16px;padding:28px;text-align:center;border:1px solid #eee;transition:all .25s;cursor:default}
  .svc-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.1)}
  .svc-day{font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  .svc-time{font-family:var(--hf);font-size:30px;color:#1a1a2e;margin-bottom:8px}
  .svc-name{font-size:14px;font-weight:600;color:#333;margin-bottom:4px}
  .svc-desc{font-size:13px;color:#888}
  #events{background:#fff}
  .evt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px}
  .evt-card{border-radius:16px;overflow:hidden;border:1px solid #eee;transition:all .25s}
  .evt-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.1)}
  .evt-head{display:flex;align-items:center;gap:16px;padding:20px 24px;background:#f9f9fc}
  .evt-badge{min-width:56px;height:56px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-weight:700}
  .evt-mo{font-size:10px;letter-spacing:1px;text-transform:uppercase}
  .evt-dy{font-size:24px;line-height:1}
  .evt-title{font-family:var(--hf);font-size:18px;color:#1a1a2e}
  .evt-body{padding:16px 24px 20px}
  .evt-body p{font-size:14px;color:#666;line-height:1.7}
  #pastor{background:#1a1a2e;padding:80px 24px}
  .pstr-inner{max-width:720px;margin:0 auto;text-align:center}
  .pstr-eyebrow{font-size:11px;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:24px}
  .pstr-photo{width:140px;height:140px;border-radius:50%;margin:0 auto 24px;overflow:hidden;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;border:3px solid var(--accent);font-size:56px}
  .pstr-photo img{width:100%;height:100%;object-fit:cover}
  .pstr-name{font-family:var(--hf);font-size:clamp(24px,3.5vw,36px);color:#fff;margin-bottom:20px}
  .pstr-bio{font-size:16px;color:rgba(255,255,255,.72);line-height:1.8}
  #ministries{background:#f9f9fc}
  .min-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
  .min-card{background:#fff;border-radius:16px;padding:28px;display:flex;gap:18px;align-items:flex-start;border:1px solid #eee;transition:all .25s}
  .min-card:hover{border-color:var(--accent);box-shadow:0 8px 30px rgba(0,0,0,.08)}
  .min-icon{font-size:32px;flex-shrink:0;line-height:1}
  .min-name{font-family:var(--hf);font-size:17px;color:#1a1a2e;margin-bottom:6px}
  .min-desc{font-size:14px;color:#666;line-height:1.6}
  #location{background:#fff}
  .mc-grid{display:grid;grid-template-columns:1fr 1fr;border-radius:20px;overflow:hidden;border:1px solid #eee;box-shadow:0 4px 30px rgba(0,0,0,.06)}
  .map-frame{width:100%;min-height:460px;border:none;display:block}
  .cp-pane{padding:48px;display:flex;flex-direction:column;justify-content:center}
  .cp-h2{font-family:var(--hf);font-size:26px;color:#1a1a2e;margin-bottom:6px}
  .cp-sub{font-size:14px;color:#888;margin-bottom:28px}
  .cp-items{display:flex;flex-direction:column;gap:14px;margin-bottom:28px}
  .cp-row{display:flex;align-items:flex-start;gap:12px;font-size:14px;color:#444}
  .cp-icon{width:36px;height:36px;border-radius:50%;background:#f0f0f8;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .cf{display:flex;flex-direction:column;gap:10px}
  .cf-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .cf input,.cf textarea{padding:11px 14px;border:1px solid #e0e0e8;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .2s;width:100%}
  .cf input:focus,.cf textarea:focus{border-color:var(--accent)}
  .cf textarea{resize:vertical;min-height:90px}
  .cf-btn{padding:12px 28px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s;align-self:flex-start}
  .cf-btn:hover{background:var(--accent-dark)}
  #footer{background:#1a1a2e;padding:36px 24px;text-align:center}
  .soc-row{display:flex;gap:14px;justify-content:center;margin-bottom:18px}
  .soc-a{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:#fff;transition:background .2s;font-size:14px;font-weight:700}
  .soc-a:hover{background:var(--accent)}
  .foot-copy{font-size:13px;color:rgba(255,255,255,.45)}
  @media(max-width:900px){.about-grid{grid-template-columns:1fr;gap:40px}.about-vis{order:-1}.mc-grid{grid-template-columns:1fr}.cp-pane{padding:32px 24px}}
  @media(max-width:768px){#nav{padding:16px 20px}#nav.scrolled{padding:12px 20px}.nav-links{display:none}.hamburger{display:block}.sec{padding:56px 20px}#pastor{padding:56px 20px}.ib-item{padding:12px 20px;border-right:none;border-bottom:1px solid rgba(255,255,255,.2)}.ib-item:last-child{border-bottom:none}}
  @media(max-width:480px){.cf-2{grid-template-columns:1fr}.hero-btns{flex-direction:column;align-items:center}}
  .skip-link{position:absolute;top:-100px;left:0;background:var(--accent);color:#fff;padding:8px 16px;z-index:9999;border-radius:0 0 8px 0;transition:top .2s;font-size:14px;font-weight:600}
  .skip-link:focus{top:0}
  #ann-banner{background:var(--accent);color:#fff;text-align:center;padding:12px 24px;font-size:13px;font-weight:500;display:none}
  #cookie-banner{position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;color:rgba(255,255,255,.85);font-size:13px;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;z-index:2000;border-top:1px solid rgba(255,255,255,.1);gap:16px}
  #cookie-banner button{flex-shrink:0;padding:7px 18px;background:var(--accent);border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:12px;font-weight:600}
  .cf-consent{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:#666;cursor:pointer;margin-bottom:8px;line-height:1.5}
  .cf-consent input[type=checkbox]{margin-top:2px;flex-shrink:0}
  </style>
</head>
<body>
<a href="#hero" class="skip-link">Skip to main content</a>
<nav id="nav">
  <div class="nav-logo" id="nav-logo"></div>
  <div class="nav-links" id="nav-links"></div>
  <button class="hamburger" onclick="openMob()" aria-label="Menu">☰</button>
</nav>
<div class="mob-nav" id="mob-nav">
  <button class="mob-close" onclick="closeMob()">✕</button>
  <div id="mob-links"></div>
</div>
<section id="hero" tabindex="-1">
  <div class="hero-bg" id="hero-bg"></div>
  <div class="hero-ov" id="hero-ov"></div>
  <div class="hero-cnt">
    <div class="hero-badge" id="hero-badge"></div>
    <h1 class="hero-h1" id="hero-h1"></h1>
    <p class="hero-sub" id="hero-sub"></p>
    <div class="hero-btns" id="hero-btns"></div>
  </div>
  <div class="scroll-hint">Scroll</div>
</section>
<div id="info-bar"></div>
<div id="ann-banner"></div>
<section class="sec" id="about">
  <div class="sec-inner">
    <div class="about-grid">
      <div class="about-vis" id="about-vis"></div>
      <div>
        <div class="about-eyebrow" id="about-eyebrow"></div>
        <h2 class="about-h2" id="about-h2"></h2>
        <div class="about-body" id="about-body"></div>
      </div>
    </div>
  </div>
</section>
<section class="sec" id="services">
  <div class="sec-inner">
    <div class="sec-hdr">
      <div class="eyebrow">Service Times</div>
      <h2 class="sec-h2" id="svc-h2"></h2>
      <p class="sec-sub" id="svc-sub"></p>
    </div>
    <div class="svc-grid" id="svc-grid"></div>
  </div>
</section>
<section class="sec" id="events">
  <div class="sec-inner">
    <div class="sec-hdr">
      <div class="eyebrow">Calendar</div>
      <h2 class="sec-h2" id="evt-h2"></h2>
      <p class="sec-sub" id="evt-sub"></p>
    </div>
    <div class="evt-grid" id="evt-grid"></div>
  </div>
</section>
<section id="pastor">
  <div class="pstr-inner">
    <div class="pstr-eyebrow" id="pstr-eyebrow"></div>
    <div class="pstr-photo" id="pstr-photo"></div>
    <h2 class="pstr-name" id="pstr-name"></h2>
    <p class="pstr-bio" id="pstr-bio"></p>
  </div>
</section>
<section class="sec" id="ministries">
  <div class="sec-inner">
    <div class="sec-hdr">
      <div class="eyebrow">Get Involved</div>
      <h2 class="sec-h2" id="min-h2"></h2>
      <p class="sec-sub" id="min-sub"></p>
    </div>
    <div class="min-grid" id="min-grid"></div>
  </div>
</section>
<section class="sec" id="location">
  <div class="sec-inner">
    <div class="sec-hdr">
      <div class="eyebrow">Location &amp; Contact</div>
      <h2 class="sec-h2" id="loc-h2"></h2>
    </div>
    <div class="mc-grid">
      <iframe id="map-frame" class="map-frame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms" allowfullscreen="" loading="lazy" title="Church Location"></iframe>
      <div class="cp-pane">
        <h3 class="cp-h2" id="cp-h2"></h3>
        <p class="cp-sub" id="cp-sub"></p>
        <div class="cp-items" id="cp-items"></div>
        <div id="cp-form"></div>
      </div>
    </div>
  </div>
</section>
<footer id="footer">
  <div class="soc-row" id="soc-row"></div>
  <p class="foot-copy" id="foot-copy"></p>
</footer>
<script>
(function(){
  const c=window.C,g=id=>document.getElementById(id);
  function shade(hex,amt){let r=parseInt(hex.slice(1,3),16),gv=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return '#'+[r,gv,b].map(v=>Math.min(255,Math.max(0,v+amt)).toString(16).padStart(2,'0')).join('')}
  function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function u(s){s=String(s||'').trim();return /^javascript:/i.test(s)?'#':s;}
  document.documentElement.style.setProperty('--accent',c.accent||'#6c4ecb');
  document.documentElement.style.setProperty('--accent-dark',shade(c.accent||'#6c4ecb',-20));
  document.documentElement.style.setProperty('--hf',c.headingFont||"'Playfair Display',serif");
  document.title=c.name||'Church';
  g('nav-logo').textContent=c.name||'';
  const nlks=[{label:'About',href:'#about'},{label:'Services',href:'#services'},{label:'Events',href:'#events'},{label:'Contact',href:'#location'}];
  g('nav-links').innerHTML=nlks.map(l=>`<a href="${e(l.href)}">${e(l.label)}</a>`).join('')+`<a href="#services" class="nav-cta">${e(c.navCtaText||'Join Us')}</a>`;
  g('mob-links').innerHTML=nlks.map(l=>`<a href="${e(l.href)}" onclick="closeMob()">${e(l.label)}</a>`).join('')+`<a href="#services" onclick="closeMob()" style="color:var(--accent);font-weight:700">${e(c.navCtaText||'Join Us')}</a>`;
  window.addEventListener('scroll',()=>g('nav').classList.toggle('scrolled',scrollY>60));
  const hbg=g('hero-bg');
  if(c.heroType==='image'&&c.heroImage){hbg.style.backgroundImage=`url('${c.heroImage}')`;hbg.style.backgroundColor=c.heroColor||'#1a1a4e';}
  else if(c.heroType==='gradient'){hbg.style.background=`linear-gradient(135deg,${c.heroGradFrom||'#1a1a4e'},${c.heroGradTo||'#4a0e6e'})`;}
  else{hbg.style.backgroundColor=c.heroColor||'#1a1a4e';}
  g('hero-ov').style.background=`rgba(0,0,0,${c.heroOverlay||0.4})`;
  const hbadge=g('hero-badge');
  if(c.badge){hbadge.textContent=c.badge;}else{hbadge.style.display='none';}
  g('hero-h1').textContent=c.heroHeading||c.name||'';
  g('hero-sub').textContent=c.heroSub||'';
  g('hero-btns').innerHTML=`<a href="${e(u(c.heroCta1Link||'#services'))}" class="btn btn-p">${e(c.heroCta1||'Join Us')}</a>`+(c.heroCta2?`<a href="${e(u(c.heroCta2Link||'#about'))}" class="btn btn-o">${e(c.heroCta2)}</a>`:'');
  if(c.showInfoBar!==false){g('info-bar').innerHTML=[c.infoAddress?`<div class="ib-item">📍 ${e(c.infoAddress)}</div>`:'',c.infoService?`<div class="ib-item">🕐 ${e(c.infoService)}</div>`:'',c.infoPhone?`<div class="ib-item">📞 ${e(c.infoPhone)}</div>`:''].join('');}else{g('info-bar').style.display='none';}
  if(c.showAbout!==false){const av=g('about-vis');if(c.aboutImage){av.innerHTML=`<img src="${e(c.aboutImage)}" alt="${e(c.aboutImageAlt||c.aboutHeading||'Our Church')}"/>`;}else{av.innerHTML='⛪';}g('about-eyebrow').textContent=c.aboutSub||'';g('about-h2').textContent=c.aboutHeading||'About Us';g('about-body').innerHTML=(c.aboutBody||'').split('\n\n').map(p=>`<p>${e(p)}</p>`).join('');}else{g('about').style.display='none';}
  if(c.showServices!==false){g('svc-h2').textContent=c.servicesHeading||'Join Us';g('svc-sub').textContent=c.servicesSub||'';g('svc-grid').innerHTML=(c.services||[]).map(s=>`<div class="svc-card"><div class="svc-day">${e(s.day)}</div><div class="svc-time">${e(s.time)}</div><div class="svc-name">${e(s.name)}</div>${s.desc?`<div class="svc-desc">${e(s.desc)}</div>`:''}</div>`).join('');}else{g('services').style.display='none';}
  const EC=['#6c4ecb','#e8507a','#20b2aa','#f59e0b'];
  if(c.showEvents!==false){g('evt-h2').textContent=c.eventsHeading||'Events';g('evt-sub').textContent=c.eventsSub||'';g('evt-grid').innerHTML=(c.events||[]).map((ev,i)=>`<div class="evt-card"><div class="evt-head"><div class="evt-badge" style="background:${e(ev.color||EC[i%4])}"><span class="evt-mo">${e(ev.month)}</span><span class="evt-dy">${e(ev.day)}</span></div><div class="evt-title">${e(ev.title)}</div></div><div class="evt-body"><p>${e(ev.desc)}</p></div></div>`).join('');}else{g('events').style.display='none';}
  if(c.showPastor!==false){g('pstr-eyebrow').textContent=c.pastorTitle||'Meet Our Pastor';const pp=g('pstr-photo');if(c.pastorImage){pp.innerHTML=`<img src="${e(c.pastorImage)}" alt="${e(c.pastorName)}"/>`;}else{pp.textContent='✝';}g('pstr-name').textContent=c.pastorName||'';g('pstr-bio').textContent=c.pastorBio||'';}else{g('pastor').style.display='none';}
  if(c.showMinistries!==false){g('min-h2').textContent=c.ministriesHeading||'Our Ministries';g('min-sub').textContent=c.ministriesSub||'';g('min-grid').innerHTML=(c.ministries||[]).map(m=>`<div class="min-card"><div class="min-icon">${e(m.icon)}</div><div><div class="min-name">${e(m.name)}</div><div class="min-desc">${e(m.desc)}</div></div></div>`).join('');}else{g('ministries').style.display='none';}
  g('loc-h2').textContent=c.mapHeading||'Find Us';
  if(c.showMap!==false){const src=u(c.mapEmbedUrl)||`https://maps.google.com/maps?q=${encodeURIComponent(c.mapAddress||c.contactAddress||'')}&output=embed`;g('map-frame').src=src;}else{g('map-frame').style.display='none';}
  if(c.showContact!==false){g('cp-h2').textContent=c.contactHeading||'Get In Touch';g('cp-sub').textContent=c.contactSub||'';g('cp-items').innerHTML=[c.contactAddress?`<div class="cp-row"><div class="cp-icon">📍</div><span>${e(c.contactAddress)}</span></div>`:'',c.contactPhone?`<div class="cp-row"><div class="cp-icon">📞</div><span>${e(c.contactPhone)}</span></div>`:'',c.contactEmail?`<div class="cp-row"><div class="cp-icon">✉️</div><a href="mailto:${e(c.contactEmail)}" style="color:var(--accent)">${e(c.contactEmail)}</a></div>`:'',c.contactWeb?`<div class="cp-row"><div class="cp-icon">🌐</div><a href="${e(u(c.contactWeb))}" target="_blank" style="color:var(--accent)">${e(c.contactWeb)}</a></div>`:''].join('');if(c.formspreeId){const _consent=(c.privacyPolicyUrl||c.cookieNotice)?`<label class="cf-consent"><input type="checkbox" required/><span>I consent to my submitted data being used to respond to my inquiry${c.privacyPolicyUrl?` — <a href="${e(u(c.privacyPolicyUrl))}" target="_blank" rel="noopener noreferrer" style="color:var(--accent)">Privacy Policy</a>`:''}</span></label>`:'';g('cp-form').innerHTML=`<form class="cf" action="https://formspree.io/f/${e(c.formspreeId)}" method="POST"><div class="cf-2"><input name="name" placeholder="Your Name" required/><input name="email" type="email" placeholder="Email" required/></div><input name="subject" placeholder="Subject"/><textarea name="message" placeholder="Your message..." required></textarea>${_consent}<button class="cf-btn" type="submit">Send Message</button></form>`;}else if(c.contactEmail){g('cp-form').innerHTML=`<a href="mailto:${e(c.contactEmail)}" class="btn btn-p" style="align-self:flex-start">Send Us an Email</a>`;}}
  const socs=[['Facebook',c.facebook,'f'],['Instagram',c.instagram,'ig'],['YouTube',c.youtube,'▶'],['Twitter/X',c.twitter,'𝕏']].filter(s=>s[1]);
  if(socs.length){g('soc-row').innerHTML=socs.map(s=>`<a href="${e(u(s[1]))}" class="soc-a" target="_blank" rel="noopener noreferrer" title="${e(s[0])}">${s[2]}</a>`).join('');}
  g('foot-copy').textContent=c.footerText||`© ${new Date().getFullYear()} ${c.name}. All rights reserved.`;
  window.openMob=()=>g('mob-nav').classList.add('open');
  window.closeMob=()=>g('mob-nav').classList.remove('open');
  // FAVICON
  if(c.favicon){const _fl=document.createElement('link');_fl.rel='icon';_fl.href=c.favicon;document.head.appendChild(_fl);}
  // SEO META + OPEN GRAPH + TWITTER CARD
  const _desc=c.metaDesc||c.heroSub||c.tagline||'';
  const _metas=[['name','description',_desc],['property','og:type','website'],['property','og:title',c.name||''],['property','og:description',_desc],['property','og:image',c.ogImage||''],['property','og:url',c.siteUrl||''],['name','twitter:card','summary_large_image'],['name','twitter:title',c.name||''],['name','twitter:description',_desc],['name','twitter:image',c.ogImage||'']].filter(t=>t[2]);
  _metas.forEach(t=>{const m=document.createElement('meta');m.setAttribute(t[0],t[1]);m.content=t[2];document.head.appendChild(m);});
  if(c.siteUrl){const _cl=document.createElement('link');_cl.rel='canonical';_cl.href=c.siteUrl;document.head.appendChild(_cl);}
  // SCHEMA.ORG JSON-LD
  const _schema={"@context":"https://schema.org","@type":"Church","name":c.name||"","description":_desc,"url":c.siteUrl||"","telephone":c.contactPhone||"","email":c.contactEmail||"","address":{"@type":"PostalAddress","streetAddress":c.contactAddress||""}};
  if(c.ogImage){_schema.image=c.ogImage;}
  const _sl=document.createElement('script');_sl.type='application/ld+json';_sl.textContent=JSON.stringify(_schema);document.head.appendChild(_sl);
  // NAV LOGO IMAGE (overrides text name when logoUrl is set)
  if(c.logoUrl){g('nav-logo').innerHTML=`<img src="${e(u(c.logoUrl))}" alt="${e(c.name||'')}" style="height:40px;width:auto;display:block"/>`;}
  // DONATION BUTTON IN NAV
  if(c.donationUrl){const _db=document.createElement('a');_db.href=u(c.donationUrl);_db.target='_blank';_db.rel='noopener noreferrer';_db.textContent=c.donationText||'Give';_db.style.cssText='padding:9px 22px;border-radius:24px;font-size:13px;font-weight:600;background:transparent;color:#fff;border:1px solid rgba(255,255,255,.6);transition:all .2s;white-space:nowrap;margin-left:4px';g('nav-links').appendChild(_db);}
  // ANNOUNCEMENT BANNER
  if(c.announcementBanner){const _ab=g('ann-banner');_ab.textContent=c.announcementBanner;_ab.style.display='block';}
  // PRIVACY LINK IN FOOTER
  if(c.privacyPolicyUrl){const _ppl=document.createElement('a');_ppl.href=u(c.privacyPolicyUrl);_ppl.target='_blank';_ppl.rel='noopener noreferrer';_ppl.style.cssText='display:inline-block;margin-top:10px;font-size:12px;color:rgba(255,255,255,.35)';_ppl.textContent='Privacy Policy';g('footer').appendChild(_ppl);}
  // COOKIE CONSENT BANNER
  if(c.cookieNotice&&!sessionStorage.getItem('cookie_ack')){const _cb=document.createElement('div');_cb.id='cookie-banner';_cb.innerHTML=`<span>${e(c.cookieNotice)}</span><button onclick="document.getElementById('cookie-banner').remove();sessionStorage.setItem('cookie_ack','1')">Got it</button>`;document.body.appendChild(_cb);}
})();
